<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg0:#04060c;--bg1:#0a0e1a;--bg2:#111827;--bg3:#1a2332;--bg4:#1e293b;--brd:#1e293b;--brd2:#334155;--t1:#f1f5f9;--t2:#e2e8f0;--t3:#94a3b8;--t4:#64748b;--t5:#475569;--blue:#3b82f6;--cyan:#06b6d4;--orange:#f97316;--purple:#a855f7;--teal:#2dd4bf;--amber:#f59e0b;--green:#22c55e;--red:#ef4444;--F:'Outfit',sans-serif;--M:'IBM Plex Mono',monospace}*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--F);background:var(--bg0);color:var(--t1);min-height:100vh}body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(59,130,246,.03) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(168,85,247,.02) 0%,transparent 50%);pointer-events:none}.app{position:relative;z-index:1}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}.hdr{background:linear-gradient(180deg,rgba(17,24,39,.97),rgba(10,14,26,.92));backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.brand{display:flex;align-items:center;gap:12px}.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--orange),var(--red));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 12px rgba(249,115,22,.3)}.brand-title{font-size:16px;font-weight:800;letter-spacing:-.3px}.brand-sub{font-size:10px;color:var(--t4)}.hdr-right{display:flex;align-items:center;gap:8px}.dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s ease-in-out infinite}.dot.ok{background:var(--green)}.dot.loading{background:var(--amber)}.dot.err{background:var(--red)}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.rbtn{padding:5px 12px;border-radius:7px;background:var(--bg4);border:1px solid var(--brd);color:var(--t3);font-size:10px;font-weight:600;font-family:var(--F);cursor:pointer;text-decoration:none;transition:.2s}.rbtn:hover{border-color:var(--brd2);color:var(--t1)}.rbtn.ea{background:linear-gradient(135deg,var(--amber),#d97706);color:#fff;border:none}.nav{display:flex;gap:3px;background:var(--bg1);padding:3px;border-radius:9px;border:1px solid var(--brd)}.nav-b{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--F);background:transparent;color:var(--t4);transition:.2s;white-space:nowrap}.nav-b:hover{color:var(--t3);background:var(--bg2)}.nav-b.on{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.35)}.main{padding:24px 28px;max-width:1360px;margin:0 auto}@media(max-width:900px){.main{padding:14px}.hdr{padding:0 14px}.g2{grid-template-columns:1fr!important}}.gk{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:20px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}.kpi{background:var(--bg2);border-radius:13px;padding:20px 22px;border:1px solid var(--brd);position:relative;overflow:hidden;transition:.25s;animation:fu .5s ease-out both}.kpi:hover{border-color:var(--brd2);transform:translateY(-2px);box-shadow:0 4px 24px rgba(0,0,0,.3)}.kpi:nth-child(1){animation-delay:.05s}.kpi:nth-child(2){animation-delay:.1s}.kpi:nth-child(3){animation-delay:.15s}.kpi:nth-child(4){animation-delay:.2s}.kpi:nth-child(5){animation-delay:.25s}.kpi-ac{position:absolute;top:0;left:0;width:3px;height:100%}.kpi-ico{position:absolute;top:14px;right:16px;font-size:22px;opacity:.12}.kpi-lbl{font-size:9.5px;color:var(--t4);text-transform:uppercase;letter-spacing:1.4px;font-weight:700;margin-bottom:8px;padding-left:12px}.kpi-val{font-size:28px;font-weight:900;font-family:var(--M);letter-spacing:-1px;line-height:1;padding-left:12px}.kpi-ft{display:flex;align-items:center;gap:8px;margin-top:10px;padding-left:12px}.kpi-tr{font-size:11px;font-weight:700;font-family:var(--M);padding:2px 7px;border-radius:5px}.kpi-tr.up{background:rgba(239,68,68,.12);color:var(--red)}.kpi-tr.dn{background:rgba(34,197,94,.12);color:var(--green)}.kpi-s{font-size:10px;color:var(--t4)}.pnl{background:var(--bg2);border-radius:13px;border:1px solid var(--brd);overflow:hidden;animation:fu .5s ease-out both}.pnl-h{padding:16px 22px 12px;display:flex;justify-content:space-between;align-items:center}.pnl-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t4)}.pnl-b{padding:0 22px 20px}.pnl-st{font-size:10px;color:var(--t5)}.sr{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--brd)}.sr:last-child{border-bottom:none}.sr-l{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--t3);font-weight:600;min-width:115px}.sr-d{width:7px;height:7px;border-radius:50%}.sr-v{font-family:var(--M);font-size:12px;font-weight:600;min-width:60px;text-align:right}.bars{display:flex;align-items:flex-end;gap:9px;height:190px;padding:0 6px}.bc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}.bv{font-size:9px;color:var(--t4);font-family:var(--M);margin-bottom:5px}.bar{width:100%;max-width:42px;border-radius:5px 5px 2px 2px;position:relative;transition:height .8s cubic-bezier(.4,0,.2,1)}.bar::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent 60%)}.bl{font-size:10px;color:var(--t4);font-weight:700;margin-top:7px}.tw{overflow-x:auto;overflow-y:auto;max-height:480px;-webkit-overflow-scrolling:touch}.tw table{width:100%;min-width:600px;border-collapse:separate;border-spacing:0;font-size:11px;table-layout:fixed}.tw th{padding:10px 12px;text-align:right;color:var(--t4);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--brd);position:sticky;top:0;background:var(--bg2);z-index:2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tw th:first-child{text-align:left}.tw td{padding:9px 12px;color:var(--t3);font-variant-numeric:tabular-nums;border-bottom:1px solid var(--brd);transition:.2s;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tw td:first-child{text-align:left}.tw tr:hover td{background:var(--bg3)}

@media(max-width:640px){
.hdr{height:auto;flex-wrap:wrap;padding:10px 14px;gap:8px}
.brand-title{font-size:14px}.brand-sub{font-size:9px}

.g2{grid-template-columns:1fr;gap:10px}

.bars{height:140px;gap:6px}.bv{font-size:8px}.bl{font-size:9px}
.sr-l{font-size:10px;min-width:90px}.sr-v{font-size:11px;min-width:50px}
.tw{max-height:400px}.tw table{min-width:520px;font-size:10px}.tw th,.tw td{padding:6px 8px}
.stt{font-size:14px}
.ub{padding:6px 14px;font-size:9px}
.eb{padding:8px 14px;font-size:10px;flex-wrap:wrap;gap:8px}
.sc{padding:14px 16px}.sc-n{font-size:12px}
.ib{padding:16px}.ib h4{font-size:13px}

}
@media(max-width:380px){
.gk{grid-template-columns:1fr}
.nav-b{padding:4px 8px;font-size:9px}
.kpi-val{font-size:20px}
}.nm{font-family:var(--M);text-align:right!important}.ps{color:var(--red)!important}.ng{color:var(--green)!important}.bd{font-weight:700;color:var(--t1)!important}.sg{display:grid;gap:12px}.sc{background:var(--bg2);border-radius:13px;padding:18px 22px;border:1px solid var(--brd);border-left-width:3px;transition:.2s}.sc:hover{border-color:var(--brd2)}.sc-n{font-weight:800;font-size:13px}.sc-u{font-family:var(--M);font-size:10px;color:var(--t4);margin-top:3px}.sc-bg{padding:2px 9px;border-radius:20px;font-size:9px;font-weight:700}.sc-nt{font-size:11px;color:var(--t3);line-height:1.7;margin-top:10px}.ib{background:linear-gradient(135deg,var(--bg2),#0f1729);border-radius:13px;padding:24px;border:1px solid var(--brd2);margin-top:12px}.ib h4{font-size:15px;font-weight:800;margin-bottom:14px}.ib p{font-size:11px;color:var(--t3);line-height:1.8;margin-bottom:10px}.ib strong{color:var(--blue)}.emp{padding:40px;text-align:center;color:var(--t5);font-size:13px}.stt{font-size:16px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.stt .c{font-size:12px;font-weight:400;color:var(--t4)}.hidden{display:none!important}.ub{background:var(--bg4);padding:7px 28px;font-size:10px;color:var(--t5);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--brd)}@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.ei{background:var(--bg1);border:1px solid var(--blue);color:var(--t1);padding:4px 8px;border-radius:4px;font-family:var(--M);font-size:11px;width:80px;text-align:right}.ei:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 2px rgba(6,182,212,.2)}.eb{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:10px 28px;font-size:11px;color:var(--amber);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--amber)}.eb button{padding:4px 14px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:11px;font-family:var(--F)}.sb{background:var(--green);color:#fff}.cb{background:var(--bg4);color:var(--t3)}.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}.md{background:var(--bg2);border:1px solid var(--brd2);border-radius:14px;padding:28px;max-width:360px;width:100%}.md h3{font-size:16px;font-weight:800;margin-bottom:16px}.md input{width:100%;padding:10px 14px;background:var(--bg1);border:1px solid var(--brd);border-radius:8px;color:var(--t1);font-size:14px;margin-bottom:12px}.md input:focus{outline:none;border-color:var(--blue)}.md .mb{width:100%;padding:10px;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--F);background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff}.md .me{color:var(--red);font-size:11px;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">
<header class="hdr"><div class="brand"><div class="logo">⛽</div><div><div class="brand-title">Fuel Price Tracker</div><div class="brand-sub" id="st">Loading...</div></div></div><nav class="nav"><button class="nav-b on" data-t="dash">◉ Dashboard</button><button class="nav-b" data-t="daily">◫ Daily Data</button><button class="nav-b" data-t="weekly">◧ EU Bulletin</button><button class="nav-b" data-t="src">◎ Sources</button></nav><div class="hdr-right"><div class="dot loading" id="dot"></div><button class="rbtn" onclick="init()">↻ Refresh</button><button class="rbtn" onclick="downloadExcel()" style="background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border:none">📥 Excel</button><button class="rbtn" id="eBtn" onclick="toggleEdit()">🔒 Edit</button></div></header>
<div class="ub" id="ub">⏳ Loading...</div>
<div class="eb hidden" id="eBar">✏️ EDIT MODE — Click values to edit <button class="sb" onclick="downloadExcel()">📥 Download</button> <button class="sb" onclick="saveToGitHub()" style="background:linear-gradient(135deg,var(--blue),#2563eb)">☁️ Save to GitHub</button> <button class="sb" onclick="runScraper()" style="background:linear-gradient(135deg,var(--purple),#7c3aed)">🚀 Run Scraper</button> <button class="cb" onclick="cancelEdit()">Cancel</button> <span style="font-size:10px;margin-left:8px" id="saveStatus"></span></div>
<main class="main">
<section id="tab-dash"><div style="display:flex;justify-content:flex-end;margin-bottom:12px" id="vat-dash"></div><div class="gk" id="kpi"></div><div class="g2"><div class="pnl"><div class="pnl-h"><span class="pnl-t">14-Day Trends</span></div><div class="pnl-b" id="spk"></div></div><div class="pnl"><div class="pnl-h"><span class="pnl-t">EU Oil Bulletin</span><span class="pnl-st" id="eul"></span></div><div class="pnl-b"><div class="bars" id="bch"></div></div></div></div></section>
<section id="tab-daily" class="hidden"><div class="stt">Daily Price Log <span class="c" id="dc"></span><div id="vat-daily"></div></div><div class="pnl"><div class="tw" id="dt"></div></div></section>
<section id="tab-weekly" class="hidden"><div class="stt">EU Weekly Oil Bulletin <span class="c" id="wc"></span><div id="vat-weekly"></div></div><div class="pnl"><div class="tw" id="wt"></div></div></section>
<section id="tab-src" class="hidden"><div class="stt">Data Sources</div><div class="sg" id="sg"></div></section>
</main></div>
<div class="mo hidden" id="pm"><div class="md"><h3>🔐 Edit Mode</h3><div class="me hidden" id="pe">Wrong password</div><input type="password" id="pi" placeholder="Edit password..." onkeydown="if(event.key==='Enter')document.getElementById('ti').focus()"><input type="password" id="ti" placeholder="GitHub token (ghp_...)" onkeydown="if(event.key==='Enter')ck()"><div style="font-size:9px;color:var(--t5);margin:-6px 0 10px">Token needed to save to GitHub. Create: GitHub → Settings → Developer settings → Tokens (classic)</div><button class="mb" onclick="ck()">Unlock</button></div></div>
<script>
const REPO="harkis123/Fuel-Tracker",FILE="fuel_tracker.xlsx";
const URL_=()=>`https://raw.githubusercontent.com/${REPO}/main/${FILE}?t=${Date.now()}`;
let D=[],W=[],EM=false;
// VAT rates per country (as multiplier divisor, e.g. 1.21 for 21%)
const VAT={LT:1.21,PL:1.23,DE:1.19,SE:1.25,LV:1.21,EE:1.24,DK:1.25,FI:1.255,EU:1.0};
// Per-tab VAT toggle state (true = su PVM, false = be PVM)
const SHOW_VAT={dash:true,daily:true,weekly:true};
function exVat(v,rate){return v!=null?v/rate:null;}
function applyVat(v,rate,showVat){return showVat?v:exVat(v,rate);}
function vatToggleHtml(tab){const on=SHOW_VAT[tab];return`<div style="display:flex;align-items:center;gap:6px;font-size:10px"><span style="color:var(--t5)">Kaina:</span><button onclick="toggleVat('${tab}')" style="display:flex;background:var(--bg4);border:1px solid var(--brd2);border-radius:20px;padding:2px;cursor:pointer;gap:2px"><span style="padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;font-family:var(--F);transition:.2s;${on?'background:var(--bg2);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.4)':'color:var(--t5)'}">su PVM</span><span style="padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;font-family:var(--F);transition:.2s;${!on?'background:var(--blue);color:#fff;box-shadow:0 1px 4px rgba(59,130,246,.4)':'color:var(--t5)'}">be PVM</span></button></div>`;}
function toggleVat(tab){SHOW_VAT[tab]=!SHOW_VAT[tab];render();}

document.querySelectorAll('.nav-b').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.nav-b').forEach(x=>x.classList.remove('on'));b.classList.add('on');['dash','daily','weekly','src'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('hidden',t!==b.dataset.t));}));

function toggleEdit(){if(EM){cancelEdit();return;}document.getElementById('pm').classList.remove('hidden');document.getElementById('pi').value='';document.getElementById('ti').value=sessionStorage.getItem('gh_token')||'';document.getElementById('pe').classList.add('hidden');setTimeout(()=>document.getElementById('pi').focus(),100);}
function ck(){const pw=document.getElementById('pi').value,tk=document.getElementById('ti').value.trim();if(pw!=='sltpara'){document.getElementById('pe').textContent='Wrong password';document.getElementById('pe').classList.remove('hidden');return;}if(tk)sessionStorage.setItem('gh_token',tk);EM=true;document.getElementById('pm').classList.add('hidden');document.getElementById('eBtn').className='rbtn ea';document.getElementById('eBtn').textContent='🔓 Editing';document.getElementById('eBar').classList.remove('hidden');render();}
function cancelEdit(){EM=false;document.getElementById('eBtn').className='rbtn';document.getElementById('eBtn').textContent='🔒 Edit';document.getElementById('eBar').classList.add('hidden');render();}
function onEdit(dt,fld,el){const v=parseFloat(el.value);if(!isNaN(v)){const r=D.find(x=>x.date===dt);if(r){r[fld]=v;if(r.plnM3&&r.plnEur)r.plEur=r.plnM3/r.plnEur/1000;if(r.plEur!=null&&r.ltEur!=null){r.delta=r.plEur-r.ltEur;r.deltaPct=r.delta/r.ltEur;}if(r.seSek&&r.sekEur)r.seEur=r.seSek/r.sekEur;render();}}}
function onEditDate(oldDt,el){const r=D.find(x=>x.date===oldDt);if(r){r.date=el.value;const d=new Date(el.value);r.day=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];render();}}
function onEditW(dt,fld,el){
  const r=W.find(x=>x.date===dt);
  if(!r)return;
  if(fld==='_date'){
    r.date=el.value;
    render();
  }else{
    const v=parseFloat(el.value);
    if(!isNaN(v)){r[fld]=v;render();}
  }
}
function saveEdits(){downloadExcel();cancelEdit();}

async function init(){
const dot=document.getElementById('dot'),st=document.getElementById('st'),ub=document.getElementById('ub');
dot.className='dot loading';st.textContent='Fetching...';
try{
const r=await fetch(URL_(),{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);
const wb=XLSX.read(await r.arrayBuffer(),{type:'array',cellDates:true});

if(wb.SheetNames.includes('Daily Tracker')){
const raw=XLSX.utils.sheet_to_json(wb.Sheets['Daily Tracker'],{header:1,defval:null});
let hi=0;for(let i=0;i<10;i++){if(raw[i]&&raw[i][0]==='Date'){hi=i;break;}}
let all=[];
for(let i=hi+1;i<raw.length;i++){const r=raw[i];if(!r||!r[0])continue;
const dt=r[0] instanceof Date?r[0].toISOString().split('T')[0]:String(r[0]).substring(0,10);
if(!dt||dt.length<8)continue;
all.push({date:dt,day:r[1]||'',plnM3:nn(r[2]),plnEur:nn(r[3]),plEur:nn(r[4]),ltEur:nn(r[5]),delta:nn(r[6]),deltaPct:nn(r[7]),deEur:nn(r[8]),seSek:nn(r[9]),sekEur:nn(r[10]),seEur:nn(r[11]),notes:r[12]||''});}
// DEDUP: keep row with most data per date
const bd={};all.forEach(r=>{const c=[r.ltEur,r.plEur,r.deEur,r.seEur,r.plnM3].filter(v=>v!=null).length;if(!bd[r.date]||c>bd[r.date].c)bd[r.date]={r,c};});
D=Object.values(bd).map(v=>v.r).sort((a,b)=>b.date.localeCompare(a.date));}

if(wb.SheetNames.includes('Weekly Oil Bulletin')){
const raw=XLSX.utils.sheet_to_json(wb.Sheets['Weekly Oil Bulletin'],{header:1,defval:null});
let hi=0;for(let i=0;i<15;i++){if(!raw[i])continue;const v=String(raw[i][0]||'').toLowerCase();if(v.includes('week')||v.includes('data')||v.includes('date')){hi=i;break;}if(raw[i][0] instanceof Date){hi=Math.max(0,i-1);break;}}
let aw=[];for(let i=hi+1;i<raw.length;i++){const r=raw[i];if(!r||!r[0])continue;
let dt='';if(r[0] instanceof Date){dt=r[0].toISOString().split('T')[0];}else{const s=String(r[0]).substring(0,10);if(/\d{4}-\d{2}-\d{2}/.test(s))dt=s;else continue;}
if(!dt||dt.length<10)continue;
aw.push({date:dt,LT:nn(r[1]),LV:nn(r[2]),EE:nn(r[3]),DK:nn(r[4]),SE:nn(r[5]),FI:nn(r[6]),EU:nn(r[7])});}
const bw={};aw.forEach(r=>{const c=[r.LT,r.LV,r.EE,r.DK,r.SE,r.FI].filter(v=>v!=null).length;if(!bw[r.date]||c>bw[r.date].c)bw[r.date]={r,c};});
W=Object.values(bw).map(v=>v.r).sort((a,b)=>b.date.localeCompare(a.date));}

dot.className='dot ok';st.textContent=`${D.length} daily · ${W.length} weekly`;
ub.innerHTML=`✅ ${D.length} daily, ${W.length} weekly — ${new Date().toLocaleString('lt-LT')}`;
render();
}catch(e){dot.className='dot err';st.textContent='Error';ub.innerHTML=`❌ ${e.message}`;}}

function pc(a,b){return(a&&b&&b!==0)?((a-b)/b)*100:null}

// Weekly avg: 7 CALENDAR days ending on refDate (inclusive)
function weekAvgPlnM3ByDate(refDate){
  const end=new Date(refDate+'T23:59:59');

  const endStr=refDate;
  const vals=D.filter(r=>r.date>=startStr&&r.date<=endStr&&r.plnM3!=null).map(r=>r.plnM3);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}

// History: for each day i, compute 7-day rolling avg ending at that day

const weekEnd=D[0]?.date||'';

// Shared tooltip element
const _tt=(()=>{const d=document.createElement('div');d.style.cssText='position:fixed;background:#1e293b;border:1px solid #334155;border-radius:7px;padding:6px 10px;font-size:11px;font-family:var(--M,monospace);color:#f1f5f9;pointer-events:none;z-index:9999;opacity:0;transition:opacity .15s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.5)';document.body.appendChild(d);return d;})();
function _showTT(e,html){_tt.innerHTML=html;_tt.style.opacity='1';_moveTT(e);}
function _moveTT(e){const x=e.clientX,y=e.clientY,w=_tt.offsetWidth;_tt.style.left=(x+14+w>window.innerWidth?x-w-10:x+14)+'px';_tt.style.top=(y-36)+'px';}
function _hideTT(){_tt.style.opacity='0';}

// sk: data = array of numbers OR {v,label} objects; color, w, h
function sk(data,color,w,h){
  if(!data||data.length<2)return`<svg width="${w}" height="${h}" style="opacity:.3"><text x="${w/2}" y="${h/2+3}" text-anchor="middle" fill="#64748b" font-size="8">—</text></svg>`;
  const vals=data.map(d=>typeof d==='object'?d.v:d);
  const labels=data.map((d,i)=>typeof d==='object'?d.label:null);
  const mn=Math.min(...vals),mx=Math.max(...vals),rg=mx-mn||1;
  const px=(i)=>(i/(vals.length-1))*w;
  const py=(v)=>h-((v-mn)/rg)*(h-6)-3;
  const pts=vals.map((v,i)=>`${px(i)},${py(v)}`).join(' ');
  const ly=py(vals[vals.length-1]);
  const uid='sk'+Math.random().toString(36).slice(2,7);
  // invisible hit rects for each data point
  const hits=vals.map((v,i)=>{
    const cx=px(i),cy=py(v),lbl=labels[i]?`<span style="color:#94a3b8">${labels[i]}</span><br/>`:'';
    return`<rect x="${Math.max(0,cx-w/vals.length/2)}" y="0" width="${w/vals.length}" height="${h}" fill="transparent" data-v="${v.toFixed(3)}" data-l="${labels[i]||''}" data-cx="${cx}" data-cy="${cy}" data-c="${color}"/>`;
  }).join('');
  return`<svg width="${w}" height="${h}" class="spk-svg" style="cursor:crosshair;overflow:visible"><defs><linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="0,${h} ${pts} ${w},${h}" fill="url(#g${uid})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${px(vals.length-1)}" cy="${ly}" r="2.5" fill="${color}"/><circle class="spk-dot" cx="-99" cy="-99" r="3.5" fill="${color}" stroke="#0a0e1a" stroke-width="1.5" style="pointer-events:none"/><line class="spk-vl" x1="-99" y1="0" x2="-99" y2="${h}" stroke="${color}" stroke-width="1" stroke-dasharray="2,2" opacity=".5" style="pointer-events:none"/>${hits}</svg>`;
}

// Attach tooltip events to sparklines after render
function attachSpkEvents(){
  document.querySelectorAll('.spk-svg').forEach(svg=>{
    svg.querySelectorAll('rect[data-v]').forEach(rect=>{
      rect.addEventListener('mouseenter',e=>{
        const dot=svg.querySelector('.spk-dot'),vl=svg.querySelector('.spk-vl');
        if(dot){dot.setAttribute('cx',rect.dataset.cx);dot.setAttribute('cy',rect.dataset.cy);}
        if(vl){vl.setAttribute('x1',rect.dataset.cx);vl.setAttribute('x2',rect.dataset.cx);}
        const lbl=rect.dataset.l?`<span style="color:#64748b;font-size:10px">${rect.dataset.l}</span><br>`:'';
        _showTT(e,`${lbl}<span style="color:${rect.dataset.c};font-weight:700">${rect.dataset.v}</span>`);
      });
      rect.addEventListener('mousemove',_moveTT);
      rect.addEventListener('mouseleave',()=>{
        const dot=svg.querySelector('.spk-dot'),vl=svg.querySelector('.spk-vl');
        if(dot){dot.setAttribute('cx','-99');dot.setAttribute('cy','-99');}
        if(vl){vl.setAttribute('x1','-99');vl.setAttribute('x2','-99');}
        _hideTT();
      });
    });
  });
}

const GH_API=`https://api.github.com/repos/${REPO}/contents/${FILE}`;
async function saveToGitHub(){
  const tk=sessionStorage.getItem('gh_token');
  if(!tk){alert('No GitHub token. Re-enter Edit mode with token.');return;}
  const ss=document.getElementById('saveStatus');
  ss.textContent='⏳ Saving...';ss.style.color='var(--amber)';
  try{
    // 1. Get SHA of current file
    const meta=await fetch(GH_API,{headers:{'Authorization':`token ${tk}`,'Accept':'application/vnd.github.v3+json'}});
    if(!meta.ok){const e=await meta.json();throw new Error(e.message||`HTTP ${meta.status}`);}
    const sha=(await meta.json()).sha;
    // 2. Build Excel from current D and W data
    const wb=XLSX.utils.book_new();
    const dH=[["Date","Day","PLN/m³","PLN/EUR","EUR/l","EUR/l","Δ EUR/l","Δ %","EUR/l","SEK/l","SEK/EUR","EUR/l","Notes","Freq"]];
    const dS=["","","ORLEN PL — EKODIESEL","","","ORLEN LT","Δ PL vs LT","","ELVIS DE","BSH / ST1 SE","","","",""];
    const dRows=[["⛽  Daily Fuel Prices"],["🔵 Blue = input  ·  Row 5 = newest"],dS,dH[0]];
    D.forEach(r=>dRows.push([r.date,r.day,r.plnM3,r.plnEur,r.plEur,r.ltEur,r.delta,r.deltaPct,r.deEur,r.seSek,r.sekEur,r.seEur,r.notes,'']));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(dRows),"Daily Tracker");
    const wRows=[["📊  EU Weekly Oil Bulletin — Diesel Prices with Taxes"],["Source: energy.ec.europa.eu"],["Week Start","🇱🇹 LT","🇱🇻 LV","🇪🇪 EE","🇩🇰 DK","🇸🇪 SE","🇫🇮 FI","🇪🇺 EU Avg","LT vs EU Δ","Notes"]];
    W.forEach(r=>{const d=(r.LT&&r.EU)?((r.LT-r.EU)/r.EU):null;wRows.push([r.date,r.LT,r.LV,r.EE,r.DK,r.SE,r.FI,r.EU,d,'']);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(wRows),"Weekly Oil Bulletin");
    // 3. Push to GitHub
    const content=XLSX.write(wb,{bookType:'xlsx',type:'base64'});
    const push=await fetch(GH_API,{method:'PUT',headers:{'Authorization':`token ${tk}`,'Content-Type':'application/json'},
      body:JSON.stringify({message:`📊 Manual edit ${new Date().toISOString().split('T')[0]}`,content,sha,branch:'main'})});
    if(!push.ok){const e=await push.json();throw new Error(e.message||`HTTP ${push.status}`);}
    ss.textContent='✅ Saved!';ss.style.color='var(--green)';
    setTimeout(()=>{ss.textContent='';init();},2000);
  }catch(e){ss.textContent=`❌ ${e.message}`;ss.style.color='var(--red)';console.error(e);}
}

async function runScraper(){
  const tk=sessionStorage.getItem('gh_token');
  if(!tk){alert('No GitHub token. Re-enter Edit mode with token.');return;}
  const ss=document.getElementById('saveStatus');
  ss.textContent='🚀 Triggering scraper...';ss.style.color='var(--amber)';
  try{
    // 1. Get workflow ID
    const wfRes=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows`,{
      headers:{'Authorization':`token ${tk}`,'Accept':'application/vnd.github.v3+json'}});
    if(!wfRes.ok)throw new Error(`Workflows API: ${wfRes.status}`);
    const wfs=await wfRes.json();
    const wf=wfs.workflows.find(w=>w.name==='Fuel Price Tracker')||wfs.workflows[0];
    if(!wf)throw new Error('Workflow not found');
    // 2. Dispatch
    const dispatch=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${wf.id}/dispatches`,{
      method:'POST',
      headers:{'Authorization':`token ${tk}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify({ref:'main'})
    });
    if(!dispatch.ok){const e=await dispatch.json();throw new Error(e.message||`HTTP ${dispatch.status}`);}
    ss.textContent='✅ Scraper triggered! Data updates in ~1 min.';ss.style.color='var(--green)';
    // Auto-refresh after 90 seconds
    setTimeout(()=>{ss.textContent='↻ Refreshing...';ss.style.color='var(--amber)';init();},90000);
    setTimeout(()=>{ss.textContent='';},120000);
  }catch(e){ss.textContent=`❌ ${e.message}`;ss.style.color='var(--red)';console.error(e);}
}

init();setInterval(init,5*60*1000);
</script>

name: Fuel Price Tracker

on:
  schedule:
    # 13:00 UTC ~ 16:00 LT - run AFTER Orlen LT publishes the day's PDF
    # (the old 08:30 UTC run grabbed the previous day's PDF -> off-by-one).
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Run historical backfill (2026-02 to today)?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

# Serialize runs so a manual workflow_dispatch (e.g. a backfill) can never
# race the scheduled run and produce competing commits on main.
concurrency:
  group: fuel-tracker-update
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -q

      - name: Run backfill (if selected)
        if: ${{ github.event.inputs.backfill == 'true' }}
        run: python src/backfill.py

      - name: Run daily scraper
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
        run: python src/scraper.py

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "Fuel Tracker Bot"

          git add fuel_tracker.xlsx latest_results.json
          if git diff --staged --quiet; then
            echo "Nothing changed - skipping commit."
            exit 0
          fi
          git commit -m "Update $(date +%Y-%m-%d)"

          # fuel_tracker.xlsx is binary (git can't 3-way merge it) and
          # latest_results.json is regenerated whole, so on any conflict we
          # always keep THIS run's freshly generated files. During a rebase,
          # "theirs" = the commit being replayed = ours. Unrelated remote
          # changes (e.g. edits to index.html) are still merged in normally.
          # Retry handles the case where the remote moves between fetch and push.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Attempt $attempt lost a push race - retrying."
            git rebase --abort 2>/dev/null || true
            sleep $(( (RANDOM % 5) + 3 ))
          done

          echo "::error::Could not push after 5 attempts."
          exit 1
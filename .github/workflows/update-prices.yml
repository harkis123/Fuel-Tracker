name: Fuel Price Tracker

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Run historical backfill (2026-02 to today)?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest tests/ -v

  update-prices:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill (if selected)
        if: ${{ github.event.inputs.backfill == 'true' }}
        run: python src/backfill.py

      - name: Run daily scraper
        run: python src/scraper.py

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "Fuel Tracker Bot"
          git add fuel_tracker.xlsx latest_results.json
          git diff --staged --quiet || git commit -m "📊 Update $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

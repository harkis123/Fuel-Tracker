name: Fuel Price Tracker

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Run historical backfill (2026-02 to today)?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run backfill (if selected)
        if: ${{ github.event.inputs.backfill == 'true' }}
        run: python src/backfill.py
      
      - name: Run daily scraper
        run: python src/scraper.py
      
      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "Fuel Tracker Bot"
          git add fuel_tracker.xlsx latest_results.json
          git diff --staged --quiet || git commit -m "📊 Update $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
